# Self-hosted Convex backend (single container) + dashboard.
# Mirrors get-convex/convex-backend self-hosted compose, trimmed for Dokploy.
# sc-convex injects INSTANCE_SECRET + CONVEX_*_ORIGIN at deploy time.
services:
  backend:
    # PINNED for reproducibility. Before redeploying this compose, VERIFY this tag matches the currently-running backend (docker inspect / generate via os.sh) — a mismatch will up/downgrade the engine under the live SQLite volume.
    # Tag = full commit SHA of Convex self-hosted-release-2025-09-03 (newest stable self-hosted release; the `precompiled-*` tags are bleeding-edge prereleases, do NOT use them). Source: https://github.com/get-convex/convex-backend/tags
    image: ghcr.io/get-convex/convex-backend:00bd92723422f3bff968230c94ccdeb8c1719832
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "3210:3210"
      - "3211:3211"
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME:-konglo}
      - INSTANCE_SECRET=${INSTANCE_SECRET}
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN}
      - DISABLE_BEACON=true
      - REDACT_LOGS_TO_CLIENT=true
    volumes:
      - convex_data:/convex/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    # PINNED for reproducibility. Before redeploying this compose, VERIFY this tag matches the currently-running backend (docker inspect / generate via os.sh) — a mismatch will up/downgrade the engine under the live SQLite volume.
    # Tag = full commit SHA of Convex self-hosted-release-2025-09-03 (kept in lockstep with the backend pin above). Source: https://github.com/get-convex/convex-backend/tags
    image: ghcr.io/get-convex/convex-dashboard:00bd92723422f3bff968230c94ccdeb8c1719832
    ports:
      - "6791:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=${CONVEX_CLOUD_ORIGIN}
    depends_on:
      - backend

volumes:
  convex_data:
